<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OS Perso — Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Point d'entrée UNIQUE : app.js importe lui-même le composant + l'API. -->
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- ============ Sidebar (Bottom Bar sur mobile) ============ -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">🧠</span>
        <span>OS Perso</span>
      </div>

      <nav class="nav">
        <!-- data-view = identifiant de la vue, lu par le routeur (app.js). -->
        <a href="#dashboard" class="nav-item" data-view="dashboard">
          <span class="ico">▦</span><span class="label">Dashboard</span>
        </a>
        <a href="#foyer" class="nav-item" data-view="foyer">
          <span class="ico">🏡</span><span class="label">Foyer</span>
        </a>
        <a href="#domotique" class="nav-item" data-view="domotique">
          <span class="ico">💡</span><span class="label">Domotique</span>
        </a>
        <a href="#pro" class="nav-item" data-view="pro">
          <span class="ico">💼</span><span class="label">Pro</span>
        </a>
        <a href="#finances" class="nav-item" data-view="finances">
          <span class="ico">💶</span><span class="label">Finances</span>
        </a>
      </nav>
    </aside>

    <!-- ============ Zone centrale : la Bento Box ============ -->
    <!-- Le routeur (app.js) injecte ici les <bento-card> de la vue active. -->
    <main id="main" class="main"></main>

  </div>
</body>
</html>
