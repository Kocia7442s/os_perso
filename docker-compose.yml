# OS Perso — Stack de développement local
# Lancement : docker compose up -d
# Les ${VARIABLES} sont lues automatiquement dans le fichier .env (même dossier).

services:
  # ----------------------------------------------------------------
  # Serveur Web : Apache + PHP 8.2 (image CUSTOM construite via Dockerfile)
  # ----------------------------------------------------------------
  web:
    # [Étape 2] On ne tire plus l'image officielle telle quelle : on construit
    # notre image custom (avec pdo_mysql) à partir de docker/php/Dockerfile.
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: os_perso_web
    ports:
      # Hôte ${WEB_PORT} -> Conteneur 80.
      - "${WEB_PORT}:80"
    volumes:
      # On monte la racine du projet directement dans le webroot Apache.
      # => Toute modif de fichier est visible immédiatement (dev "en direct").
      #    - Frontend  : http://localhost:${WEB_PORT}/frontend/
      #    - API (test): http://localhost:${WEB_PORT}/backend/test.php
      - ./:/var/www/html/
    depends_on:
      - db
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      # [Étape 1] Identifiants BDD fournis à PHP (via getenv) pour la future
      # couche d'accès aux données. DB_HOST=db => le nom du service Docker.
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Accès à l'IA, lu en PHP via getenv(). La clé reste hors du code (.env).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      # Calendrier commun : URLs des flux iCal publiés (lecture seule, lus via getenv()).
      # Le ":-" fournit une valeur vide par défaut si la variable n'est pas dans .env.
      CAL_1_NAME: ${CAL_1_NAME:-}
      CAL_1_URL: ${CAL_1_URL:-}
      CAL_1_COLOR: ${CAL_1_COLOR:-}
      CAL_2_NAME: ${CAL_2_NAME:-}
      CAL_2_URL: ${CAL_2_URL:-}
      CAL_2_COLOR: ${CAL_2_COLOR:-}
      CAL_3_NAME: ${CAL_3_NAME:-}
      CAL_3_URL: ${CAL_3_URL:-}
      CAL_3_COLOR: ${CAL_3_COLOR:-}
      CAL_4_NAME: ${CAL_4_NAME:-}
      CAL_4_URL: ${CAL_4_URL:-}
      CAL_4_COLOR: ${CAL_4_COLOR:-}
      CAL_5_NAME: ${CAL_5_NAME:-}
      CAL_5_URL: ${CAL_5_URL:-}
      CAL_5_COLOR: ${CAL_5_COLOR:-}
      CAL_6_NAME: ${CAL_6_NAME:-}
      CAL_6_URL: ${CAL_6_URL:-}
      CAL_6_COLOR: ${CAL_6_COLOR:-}

  # ----------------------------------------------------------------
  # Base de données : MariaDB
  # ----------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: os_perso_db
    restart: unless-stopped
    environment:
      # [Étape 1] Plus aucun secret en clair : tout vient du .env.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    ports:
      # Hôte ${DB_PORT} -> Conteneur 3306. Le backend joint la BDD en interne
      # via "db:3306" (réseau Docker) ; ce mapping ne sert qu'à l'accès depuis
      # l'hôte (ex : client SQL graphique sur localhost:${DB_PORT}).
      - "${DB_PORT}:3306"
    volumes:
      # Volume nommé : les données de la BDD survivent à un "docker compose down".
      - db_data:/var/lib/mysql
      # Scripts d'init joués au PREMIER démarrage (volume vide uniquement).
      # En lecture seule (:ro) — MariaDB ne fait que les exécuter.
      - ./docker/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

# Déclaration du volume persistant pour MariaDB
volumes:
  db_data:
